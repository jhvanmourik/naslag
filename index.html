<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huisarts Naslagwerk</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Naslagwerk">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');

        :root {
            --bg: #f5f3ef;
            --bg-card: #ffffff;
            --text: #2c2c2c;
            --text-muted: #6b6b6b;
            --accent: #2a6b5a;
            --accent-light: #e8f0ed;
            --border: #e2dfd9;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.02em;
            cursor: pointer;
        }

        .search-box {
            position: relative;
            width: 320px;
            max-width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .search-box svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-hover);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 200;
        }

        .search-results.active { display: block; }

        .search-result-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: var(--accent-light); }
        .search-result-item .result-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.15rem; }
        .search-result-item .result-category { font-size: 0.78rem; color: var(--text-muted); }

        main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        #dashboard h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
        }

        .tiles {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .tile {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .tile::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }

        .tile:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .tile-icon { font-size: 2rem; margin-bottom: 0.6rem; display: block; }
        .tile-title { font-weight: 600; font-size: 1rem; }
        .tile-count { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }

        .quick-section { margin-bottom: 2.5rem; }
        .quick-section h3 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; margin-bottom: 1rem; }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.6rem;
        }

        .quick-link {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            transition: all 0.15s;
            box-shadow: var(--shadow);
        }

        .quick-link:hover { border-color: var(--accent); background: var(--accent-light); }
        .quick-link .ql-icon { font-size: 1.1rem; }

        #category-view { display: none; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .back-btn:hover { opacity: 0.7; }

        .cat-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .cat-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; }

        .tabs {
            display: flex;
            gap: 0.25rem;
            border-bottom: 2px solid var(--border);
            margin-bottom: 1.5rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab {
            padding: 0.65rem 1.25rem;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        .content-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .content-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.15s;
            box-shadow: var(--shadow);
        }

        .content-item:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
        .content-item .item-icon { font-size: 1.3rem; flex-shrink: 0; }
        .content-item .item-text { font-size: 0.9rem; font-weight: 500; }
        .content-item .item-type { margin-left: auto; font-size: 0.75rem; color: var(--text-muted); background: var(--bg); padding: 0.15rem 0.5rem; border-radius: 4px; flex-shrink: 0; }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .image-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.2s;
        }

        .image-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
        .image-card img { width: 100%; height: auto; display: block; }
        .image-card .image-label { padding: 0.75rem 1rem; font-size: 0.88rem; font-weight: 500; border-top: 1px solid var(--border); }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            cursor: pointer;
        }

        .lightbox.active { display: flex; }
        .lightbox img { max-width: 95%; max-height: 95vh; object-fit: contain; border-radius: 4px; }

        .lightbox-close {
            position: fixed;
            top: 1rem; right: 1.5rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
            background: rgba(0,0,0,0.4);
            width: 44px; height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: none;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            header { padding: 1rem; }
            .header-inner { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; }
            main { padding: 1.25rem; }
            .tiles { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .tile { padding: 1.1rem 0.75rem; }
            .tile-icon { font-size: 1.6rem; }
            .quick-links { grid-template-columns: 1fr; }
            .image-grid { grid-template-columns: 1fr; }
            .tabs { gap: 0; }
            .tab { padding: 0.6rem 0.9rem; font-size: 0.82rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <span class="logo" onclick="showDashboard()">Naslagwerk</span>
        <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Zoeken..." oninput="handleSearch(this.value)">
            <div class="search-results" id="search-results"></div>
        </div>
    </div>
</header>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <img id="lightbox-img" src="" alt="">
</div>

<main>
    <div id="dashboard">
        <h2>Categorieën</h2>
        <div class="tiles" id="tiles-container">
            <div class="loading">Laden…</div>
        </div>

        <div class="quick-section">
            <h3>Snelkoppelingen</h3>
            <div class="quick-links">
                <a href="https://www.thuisarts.nl" target="_blank" class="quick-link"><span class="ql-icon">🏠</span> Thuisarts.nl</a>
                <a href="https://www.nhg.org/standaarden" target="_blank" class="quick-link"><span class="ql-icon">📋</span> NHG Standaarden</a>
                <a href="https://www.farmacotherapeutischkompas.nl" target="_blank" class="quick-link"><span class="ql-icon">💊</span> Farmacotherapeutisch Kompas</a>
                <a href="https://www.apotheek.nl" target="_blank" class="quick-link"><span class="ql-icon">🏥</span> Apotheek.nl</a>
            </div>
        </div>
    </div>

    <div id="category-view">
        <a class="back-btn" onclick="showDashboard()">← Terug naar overzicht</a>
        <div class="cat-header"><h2 id="cat-title"></h2></div>
        <div class="tabs" id="cat-tabs"></div>
        <div id="cat-content"></div>
    </div>
</main>

<script>
// ══════════════════════════════════════════════
// DATA LADEN UIT data.json
// Wil je iets toevoegen? Bewerk alleen data.json
// ══════════════════════════════════════════════
let categories = {};
let searchIndex = [];

async function loadData() {
    try {
        const response = await fetch('data.json');
        categories = await response.json();
        searchIndex = buildSearchIndex();
        renderTiles();
    } catch (e) {
        document.getElementById('tiles-container').innerHTML =
            '<div class="loading">Kon data.json niet laden. Controleer of het bestand aanwezig is.</div>';
    }
}

// ══════════════════════════════════════
// TILES
// ══════════════════════════════════════
function renderTiles() {
    const container = document.getElementById('tiles-container');
    container.innerHTML = Object.entries(categories).map(([key, cat]) => {
        const count = Object.values(cat.tabs).reduce((sum, tab) => sum + tab.items.length, 0);
        return '<div class="tile" style="--tile-color:' + cat.color + '" onclick="showCategory(\'' + key + '\')">' +
            '<style>.tile[style*="' + cat.color + '"]::before { background: ' + cat.color + '; }</style>' +
            '<span class="tile-icon">' + cat.icon + '</span>' +
            '<span class="tile-title">' + cat.title + '</span>' +
            '<span class="tile-count">' + count + ' item' + (count !== 1 ? 's' : '') + '</span>' +
            '</div>';
    }).join('');
}

// ══════════════════════════════════════
// SEARCH
// ══════════════════════════════════════
function buildSearchIndex() {
    const index = [];
    for (const [catKey, cat] of Object.entries(categories)) {
        index.push({ title: cat.title, category: cat.title, catKey, tabName: null, type: 'category' });
        for (const [tabName, tab] of Object.entries(cat.tabs)) {
            for (const item of tab.items) {
                index.push({ title: item.title, category: cat.title, catKey, tabName, type: tab.type });
            }
        }
    }
    return index;
}

function handleSearch(query) {
    const container = document.getElementById('search-results');
    if (!query.trim()) { container.classList.remove('active'); return; }

    const q = query.toLowerCase();
    const results = searchIndex.filter(item =>
        item.title.toLowerCase().includes(q) || item.category.toLowerCase().includes(q)
    );

    container.innerHTML = '';
    if (results.length === 0) {
        container.innerHTML = '<div class="search-result-item"><div class="result-title">Geen resultaten</div></div>';
    } else {
        results.forEach(r => {
            const div = document.createElement('div');
            div.className = 'search-result-item';
            div.innerHTML = '<div class="result-title">' + r.title + '</div>' +
                '<div class="result-category">' + r.category + (r.tabName ? ' › ' + r.tabName : '') + '</div>';
            div.addEventListener('click', function() { showCategory(r.catKey, r.tabName); clearSearch(); });
            container.appendChild(div);
        });
    }
    container.classList.add('active');
}

function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').classList.remove('active');
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-box')) {
        document.getElementById('search-results').classList.remove('active');
    }
});

// ══════════════════════════════════════
// NAVIGATIE
// ══════════════════════════════════════
function showDashboard() {
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('category-view').style.display = 'none';
    window.scrollTo(0, 0);
}

function showCategory(catKey, activeTab) {
    var cat = categories[catKey];
    if (!cat) return;

    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('category-view').style.display = 'block';
    document.getElementById('cat-title').textContent = cat.icon + ' ' + cat.title;

    var tabNames = Object.keys(cat.tabs);
    var firstTab = activeTab || tabNames[0];

    var tabsContainer = document.getElementById('cat-tabs');
    tabsContainer.innerHTML = '';
    tabNames.forEach(function(name) {
        var btn = document.createElement('button');
        btn.className = 'tab' + (name === firstTab ? ' active' : '');
        btn.textContent = name;
        btn.addEventListener('click', function() {
            tabsContainer.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            btn.classList.add('active');
            renderTabContent(catKey, name);
        });
        tabsContainer.appendChild(btn);
    });

    renderTabContent(catKey, firstTab);
    window.scrollTo(0, 0);
}

function renderTabContent(catKey, tabName) {
    var tab = categories[catKey].tabs[tabName];
    var container = document.getElementById('cat-content');
    container.innerHTML = '';

    if (tab.type === 'images') {
        var grid = document.createElement('div');
        grid.className = 'image-grid';
        tab.items.forEach(function(item) {
            var card = document.createElement('div');
            card.className = 'image-card';
            card.addEventListener('click', function() { openLightbox(item.src); });
            var img = document.createElement('img');
            img.src = item.src;
            img.alt = item.title;
            img.loading = 'lazy';
            var label = document.createElement('div');
            label.className = 'image-label';
            label.textContent = item.title;
            card.appendChild(img);
            card.appendChild(label);
            grid.appendChild(card);
        });
        container.appendChild(grid);

    } else if (tab.type === 'links') {
        var list = document.createElement('div');
        list.className = 'content-list';
        tab.items.forEach(function(item) {
            var a = document.createElement('a');
            a.href = item.url;
            a.target = '_blank';
            a.className = 'content-item';
            a.innerHTML = '<span class="item-icon">' + (item.icon || '🔗') + '</span>' +
                '<span class="item-text">' + item.title + '</span>' +
                '<span class="item-type">extern ↗</span>';
            list.appendChild(a);
        });
        container.appendChild(list);

    } else if (tab.type === 'files') {
        var list = document.createElement('div');
        list.className = 'content-list';
        tab.items.forEach(function(item) {
            var a = document.createElement('a');
            a.href = item.src;
            a.target = '_blank';
            a.className = 'content-item';
            a.innerHTML = '<span class="item-icon">📄</span>' +
                '<span class="item-text">' + item.title + '</span>' +
                '<span class="item-type">PDF</span>';
            list.appendChild(a);
        });
        container.appendChild(list);
    }
}

// ══════════════════════════════════════
// LIGHTBOX
// ══════════════════════════════════════
function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
});

// ══════════════════════════════════════
// START
// ══════════════════════════════════════
loadData();
</script>

</body>
</html>
